<!-- 
  HKMU Course Selection Guidance System - Shared Head Template
  Include this template in all pages for consistent head configuration
  
  Usage:
  <html lang="en">
    <head>
      <!-- Copy contents below -->
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="description" content="HKMU Data Science Course Selection Guidance System - Track your degree progress and plan your academic journey">
      <meta name="keywords" content="HKMU, Data Science, Course Selection, Degree Progress, Hong Kong Metropolitan University">
      <meta name="author" content="HKMU Data Science Program">
      
      <!-- Favicon -->
      <link rel="icon" type="image/svg+xml" href="/assets/hkmu-logo.svg">
      
      <!-- Page Title (customize per page) -->
      <title>Degree Progress | HKMU Data Science Course Guide</title>
      
      <!-- Google Fonts - Inter & JetBrains Mono -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
      
      <!-- Tailwind CSS v4 -->
      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
      
      <!-- Lucide Icons -->
      <script src="https://unpkg.com/lucide@latest"></script>
      
      <!-- Shared Styles -->
      <link rel="stylesheet" href="/shared/styles.css">
      
      <!-- HKMU Brand Colors CSS Variables -->
      <style>
        :root {
          /* HKMU Primary Brand Colors */
          --hkmu-blue: #0066CC;
          --hkmu-blue-light: #E3F2FD;
          --hkmu-blue-dark: #004C99;
          --hkmu-green: #2E7D52;
          --hkmu-green-light: #E8F5E9;
          --hkmu-green-dark: #1B5E20;
          
          /* Status Colors */
          --status-completed: #4CAF50;
          --status-completed-bg: #E8F5E9;
          --status-in-progress: #FF9800;
          --status-in-progress-bg: #FFF3E0;
          --status-available: #2196F3;
          --status-available-bg: #E3F2FD;
          --status-locked: #9E9E9E;
          --status-locked-bg: #F5F5F5;
          
          /* Course Category Colors */
          --category-core: #0066CC;
          --category-elective: #7C3AED;
          --category-project: #F59E0B;
          --category-english: #10B981;
          --category-general: #EC4899;
          --category-university: #6366F1;
          
          /* Background Colors */
          --bg-page: #F5F7FA;
          --bg-card: #FFFFFF;
          --bg-light-blue: #E3F2FD;
          --bg-light-green: #E8F5E9;
          
          /* Text Colors */
          --text-primary: #1A1A2E;
          --text-secondary: #6B7280;
          --text-muted: #9CA3AF;
          
          /* Border & Shadow */
          --border-color: #E5E7EB;
          --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
          --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
          --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
          --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
          
          /* Border Radius */
          --radius-sm: 6px;
          --radius-md: 8px;
          --radius-lg: 12px;
          --radius-xl: 16px;
          --radius-full: 9999px;
          
          /* Typography */
          --font-heading: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
          --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
          --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
          
          /* Animation Timing */
          --ease-default: cubic-bezier(0.4, 0, 0.2, 1);
          --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
          
          /* Spacing */
          --space-1: 4px;
          --space-2: 8px;
          --space-3: 12px;
          --space-4: 16px;
          --space-5: 20px;
          --space-6: 24px;
          --space-8: 32px;
          --space-10: 40px;
          --space-12: 48px;
          
          /* Layout */
          --max-container: 1280px;
          --nav-height: 64px;
        }
        
        /* Base Styles */
        * {
          box-sizing: border-box;
        }
        
        html {
          scroll-behavior: smooth;
        }
        
        body {
          font-family: var(--font-body);
          background-color: var(--bg-page);
          color: var(--text-primary);
          line-height: 1.6;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
        }
        
        /* Typography Scale */
        h1, h2, h3, h4, h5, h6 {
          font-family: var(--font-heading);
          font-weight: 600;
          line-height: 1.3;
          color: var(--text-primary);
        }
        
        h1 { font-size: 2.5rem; font-weight: 700; line-height: 1.2; letter-spacing: -0.02em; }
        h2 { font-size: 2rem; font-weight: 600; line-height: 1.3; letter-spacing: -0.01em; }
        h3 { font-size: 1.5rem; font-weight: 600; line-height: 1.4; }
        h4 { font-size: 1.25rem; font-weight: 600; line-height: 1.5; }
        
        /* Focus Styles for Accessibility */
        *:focus-visible {
          outline: 2px solid var(--hkmu-blue);
          outline-offset: 2px;
        }
        
        /* Selection Color */
        ::selection {
          background-color: var(--hkmu-blue-light);
          color: var(--hkmu-blue-dark);
        }
      </style>
    </head>
