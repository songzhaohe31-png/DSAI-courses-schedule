let userProgress = JSON.parse(localStorage.getItem('dsai_progress')) || {};

const getCourseStatus = id => userProgress[id] || 'not_started';
function setCourseStatus(id, status) { userProgress[id] = status; saveProgress(); showToast(`Course marked as ${status.replace('_',' ')}`); }
function checkPrerequisites(id) { const c = coursesData.find(x => x.id === id); if (!c || !c.prerequisites.length) return {canSelect:true,missing:[]}; const missing = c.prerequisites.filter(p => getCourseStatus(p) !== 'completed'); return {canSelect:!missing.length,missing}; }
function getEffectiveStatus(id) { const s = getCourseStatus(id); return s === 'not_started' ? (checkPrerequisites(id).canSelect ? 'available' : 'locked') : s; }

function showPage(pageName) {
  document.querySelectorAll('.nav-link').forEach(l => { l.classList.remove('text-hkmu-blue','font-semibold'); l.classList.add('text-text-secondary'); });
  document.querySelectorAll('.nav-link').forEach(b => { if((b.getAttribute('onclick')||'').includes("'"+pageName+"'")){ b.classList.remove('text-text-secondary'); b.classList.add('text-hkmu-blue','font-semibold'); } });
  document.getElementById('mobileMenu').classList.add('hidden');
  const renders = {home:renderHomePage,progress:renderProgressPage,courses:renderCoursesPage,plan:renderPlanPage};
  if(renders[pageName]) document.getElementById('mainContent').innerHTML = renders[pageName]();
  lucide.createIcons();
}

  return `<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8"><h1 class="text-3xl font-bold mb-2">Degree Progress</h1><p class="text-text-secondary mb-8">Track your Data Science BSc journey</p>
<div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
${[{icon:'graduation-cap',label:'Total Required',val:total,c:'text-hkmu-blue'},{icon:'check-circle',label:'Completed',val:done,c:'text-green-500'},{icon:'clock',label:'In Progress',val:inProg,c:'text-orange-500'},{icon:'target',label:'Remaining',val:total-done,c:'text-blue-500'}].map(s=>`<div class="bg-white rounded-2xl p-6 shadow-md"><div class="flex items-center gap-3 mb-2"><i data-lucide="${s.icon}" class="w-6 h-6 ${s.c}"></i><span class="text-text-secondary">${s.label}</span></div><div class="text-3xl font-bold ${s.c}">${s.val}</div><div class="text-sm text-text-secondary">credits</div></div>`).join('')}
</div>
<div class="bg-white rounded-2xl p-6 shadow-md mb-8"><h2 class="text-xl font-bold mb-4">Overall Progress</h2>
<div class="relative h-6 bg-gray-200 rounded-full overflow-hidden"><div class="absolute top-0 left-0 h-full bg-gradient-to-r from-hkmu-blue to-hkmu-green rounded-full progress-bar" style="width:${pct}%"></div></div>
<div class="flex justify-between mt-2 text-sm text-text-secondary"><span>${pct}% complete</span><span>${done} / ${total} credits</span></div></div>
<div class="bg-white rounded-2xl p-6 shadow-md mb-8"><h2 class="text-xl font-bold mb-4">Category Breakdown</h2><div class="space-y-4">
${cats.map(cat=>{const cd=coursesData.filter(c=>c.category===cat.id&&getCourseStatus(c.id)==='completed').reduce((s,c)=>s+c.credits,0),cp=Math.round(cd/cat.total*100);return`<div><div class="flex justify-between mb-1"><span class="font-medium">${cat.name}</span><span class="text-sm text-text-secondary">${cd}/${cat.total} cr (${cp}%)</span></div><div class="relative h-3 bg-gray-200 rounded-full overflow-hidden"><div class="absolute top-0 left-0 h-full bg-hkmu-blue rounded-full progress-bar" style="width:${cp}%"></div></div></div>`;}).join('')}
</div></div>
<div class="space-y-6"><h2 class="text-xl font-bold">Year-by-Year Progress</h2>
${[1,2,3,4].map(year=>{const yc=coursesData.filter(c=>c.year===year),yd=yc.filter(c=>getCourseStatus(c.id)==='completed').reduce((s,c)=>s+c.credits,0),yt=yc.reduce((s,c)=>s+c.credits,0);return`<div class="bg-white rounded-2xl p-6 shadow-md"><div class="flex justify-between items-center mb-4"><h3 class="text-lg font-bold">Year ${year}</h3><span class="text-sm text-text-secondary">${yd}/${yt} credits</span></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${yc.map(course=>renderCourseCard(course)).join('')}</div></div>`;}).join('')}
</div></div>`;
}

function renderCoursesPage() {
  return `<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8"><h1 class="text-3xl font-bold mb-2">All Courses</h1><p class="text-text-secondary mb-8">Browse the complete Data Science curriculum</p>
<div class="bg-white rounded-2xl p-6 shadow-md mb-8"><div class="grid grid-cols-1 md:grid-cols-4 gap-4">
<div><label class="block text-sm font-medium text-text-secondary mb-2">Search</label><input type="text" id="searchInput" placeholder="Search courses..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-hkmu-blue" oninput="filterCourses()"></div>
<div><label class="block text-sm font-medium text-text-secondary mb-2">Year</label><select id="yearFilter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-hkmu-blue" onchange="filterCourses()"><option value="">All Years</option>${[1,2,3,4].map(y=>`<option value="${y}">Year ${y}</option>`).join('')}</select></div>
<div><label class="block text-sm font-medium text-text-secondary mb-2">Category</label><select id="categoryFilter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-hkmu-blue" onchange="filterCourses()"><option value="">All Categories</option><option value="core">Core</option><option value="elective">Elective</option><option value="project">Project</option><option value="english">English</option><option value="general-ed">General Ed</option><option value="university-core">University Core</option></select></div>
<div><label class="block text-sm font-medium text-text-secondary mb-2">Status</label><select id="statusFilter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-hkmu-blue" onchange="filterCourses()"><option value="">All Status</option><option value="completed">Completed</option><option value="in-progress">In Progress</option><option value="available">Available</option><option value="locked">Locked</option></select></div>
</div></div>
<div id="coursesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${coursesData.map(renderCourseCard).join('')}</div></div>`;
}

function renderPlanPage() {
  return `<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8"><h1 class="text-3xl font-bold mb-2">Study Plan</h1><p class="text-text-secondary mb-8">Visualize course prerequisites and plan your academic path</p>
<div class="bg-white rounded-2xl p-6 shadow-md"><h2 class="text-xl font-bold mb-6">Prerequisite Map</h2><div class="space-y-8">
${[1,2,3,4].map(year=>`<div><h3 class="text-lg font-bold text-hkmu-blue mb-4">Year ${year}</h3><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
${coursesData.filter(c=>c.year===year).map(course=>`<div class="border-2 ${getCourseStatus(course.id)==='completed'?'border-green-500 bg-green-50':'border-gray-200 bg-white'} rounded-xl p-4"><div class="flex justify-between items-start mb-2"><span class="text-sm font-semibold text-hkmu-blue">${course.code}</span><span class="text-xs px-2 py-1 rounded-full ${getCategoryColor(course.category)}">${course.category}</span></div><div class="text-sm font-medium mb-2">${course.name}</div>${course.prerequisites.length?`<div class="text-xs text-text-secondary"><span class="font-medium">Prerequisites:</span> ${course.prerequisites.map(p=>{const pre=coursesData.find(c=>c.id===p);return pre?pre.code:p;}).join(', ')}</div>`:'<div class="text-xs text-green-600 font-medium">No prerequisites</div>'}</div>`).join('')}
</div></div>`).join('')}
</div></div></div>`;
}

function renderCourseCard(course) {
  const status=getEffectiveStatus(course.id);
  const icons={completed:'<i data-lucide="check-circle" class="w-5 h-5 text-green-500"></i>','in-progress':'<i data-lucide="clock" class="w-5 h-5 text-orange-500"></i>',available:'<i data-lucide="circle" class="w-5 h-5 text-blue-500"></i>',locked:'<i data-lucide="lock" class="w-5 h-5 text-gray-400"></i>'};
  return `<div class="course-card bg-white rounded-xl p-5 shadow-md cursor-pointer ${status==='locked'?'opacity-60':''}" ${status!=='locked'?`onclick="openCourseModal('${course.id}')"`:''}><div class="flex justify-between items-start mb-3"><span class="text-sm font-bold text-hkmu-blue">${course.code}</span>${icons[status]}</div><h3 class="font-semibold mb-2 line-clamp-2">${course.name}</h3><div class="flex items-center gap-2 mb-3"><span class="text-xs px-2 py-1 rounded-full ${getCategoryColor(course.category)}">${course.category.replace('-',' ')}</span><span class="text-xs text-text-secondary">${course.credits} cr</span></div>${course.prerequisites.length?`<div class="text-xs text-text-secondary">Pre: ${course.prerequisites.map(p=>{const pre=coursesData.find(c=>c.id===p);return pre?pre.code.split(' ')[0]:p;}).join(', ')}</div>`:''}</div>`;
}

function filterCourses() {
  const search=document.getElementById('searchInput').value.toLowerCase(), year=document.getElementById('yearFilter').value, cat=document.getElementById('categoryFilter').value, stat=document.getElementById('statusFilter').value;
  const filtered=coursesData.filter(c=>(!search||(c.name.toLowerCase().includes(search)||c.code.toLowerCase().includes(search)))&&(!year||c.year===parseInt(year))&&(!cat||c.category===cat)&&(!stat||getEffectiveStatus(c.id)===stat));
  document.getElementById('coursesGrid').innerHTML=filtered.map(renderCourseCard).join('');
  lucide.createIcons();
}

function openCourseModal(courseId) {
  const course=coursesData.find(c=>c.id===courseId); if(!course) return;
  const status=getEffectiveStatus(courseId), reviews=reviewsData[courseId]||[], materials=materialsData[courseId]||[], avg=reviews.length?(reviews.reduce((s,r)=>s+r.rating,0)/reviews.length).toFixed(1):'0.0';
  document.getElementById('courseModalContent').innerHTML=`<div class="p-6">
<div class="flex justify-between items-start mb-6"><div><span class="inline-block px-3 py-1 rounded-full text-sm font-medium ${getStatusBg(status)} mb-2">${status.replace('-',' ').toUpperCase()}</span><h2 class="text-2xl font-bold">${course.code}</h2><p class="text-lg text-text-secondary">${course.name}</p></div><button onclick="closeCourseModal()" class="p-2 hover:bg-gray-100 rounded-lg"><i data-lucide="x" class="w-6 h-6"></i></button></div>
<div class="grid grid-cols-4 gap-4 mb-6">${[['Credits',course.credits],['Year',course.year],['Semester',course.semester],['Rating',avg+' ⭐']].map(([l,v])=>`<div class="bg-page-bg rounded-lg p-3 text-center"><div class="text-sm text-text-secondary">${l}</div><div class="text-xl font-bold capitalize">${v}</div></div>`).join('')}</div>
<div class="mb-6"><h3 class="font-semibold mb-2">Description</h3><p class="text-text-secondary">${course.description}</p></div>
${course.prerequisites.length?`<div class="mb-6"><h3 class="font-semibold mb-2">Prerequisites</h3><div class="flex flex-wrap gap-2">${course.prerequisites.map(p=>{const pre=coursesData.find(c=>c.id===p);const ps=getCourseStatus(p);return`<span class="px-3 py-1 rounded-full text-sm ${ps==='completed'?'bg-green-100 text-green-700':'bg-gray-100 text-gray-600'}">${pre?pre.code:p}</span>`;}).join('')}</div></div>`:''}
<div class="mb-6"><h3 class="font-semibold mb-3">Update Status</h3><div class="flex gap-3">
<button onclick="setCourseStatus('${courseId}','completed');openCourseModal('${courseId}')" class="flex-1 py-2 px-4 bg-green-500 text-white rounded-lg hover:bg-green-600 flex items-center justify-center gap-2"><i data-lucide="check" class="w-4 h-4"></i>Completed</button>
<button onclick="setCourseStatus('${courseId}','in-progress');openCourseModal('${courseId}')" class="flex-1 py-2 px-4 bg-orange-500 text-white rounded-lg hover:bg-orange-600 flex items-center justify-center gap-2"><i data-lucide="clock" class="w-4 h-4"></i>In Progress</button>
<button onclick="setCourseStatus('${courseId}','not_started');openCourseModal('${courseId}')" class="flex-1 py-2 px-4 bg-gray-500 text-white rounded-lg hover:bg-gray-600 flex items-center justify-center gap-2"><i data-lucide="rotate-ccw" class="w-4 h-4"></i>Reset</button>
</div></div>
<div class="border-b mb-4"><div class="flex gap-6"><button onclick="switchModalTab('reviews','${courseId}')" class="pb-2 tab-active" id="tab-reviews">Reviews (${reviews.length})</button><button onclick="switchModalTab('materials','${courseId}')" class="pb-2 text-text-secondary hover:text-text-primary" id="tab-materials">Materials (${materials.length})</button></div></div>
<div id="modal-reviews" class="space-y-4 max-h-64 overflow-y-auto">${reviews.length?reviews.map(r=>`<div class="bg-page-bg rounded-lg p-4"><div class="flex justify-between items-start mb-2"><div><div class="font-semibold">${r.author}</div><div class="text-sm text-text-secondary">Year ${r.year} • ${r.semester}</div></div><div>${Array(r.rating).fill('⭐').join('')}</div></div><p class="text-text-secondary text-sm mb-2">${r.content}</p><button onclick="likeReview('${courseId}',${r.id})" class="flex items-center gap-1 text-sm text-text-secondary hover:text-hkmu-blue"><i data-lucide="thumbs-up" class="w-4 h-4"></i>${r.helpful}</button></div>`).join(''):'<p class="text-text-secondary text-center py-4">No reviews yet. Be the first to review!</p>'}</div>
<div id="modal-materials" class="space-y-4 max-h-64 overflow-y-auto hidden">${materials.length?materials.map(m=>`<div class="bg-page-bg rounded-lg p-4 flex justify-between items-center"><div class="flex items-center gap-3"><i data-lucide="file-text" class="w-8 h-8 text-hkmu-blue"></i><div><div class="font-medium">${m.filename}</div><div class="text-sm text-text-secondary">${m.category} • ${formatFileSize(m.size)} • ${m.downloads} downloads</div></div></div><button onclick="downloadMaterial('${courseId}',${m.id})" class="p-2 hover:bg-hkmu-light-blue rounded-lg text-hkmu-blue"><i data-lucide="download" class="w-5 h-5"></i></button></div>`).join(''):'<p class="text-text-secondary text-center py-4">No materials uploaded yet.</p>'}</div>
</div>`;
  document.getElementById('courseModal').classList.add('active');
  lucide.createIcons();
}

function closeCourseModal() { document.getElementById('courseModal').classList.remove('active'); }
function switchModalTab(tab) {
  ['reviews','materials'].forEach(t=>{ document.getElementById('tab-'+t).classList.toggle('tab-active',t===tab); document.getElementById('tab-'+t).classList.toggle('text-text-secondary',t!==tab); document.getElementById('modal-'+t).classList.toggle('hidden',t!==tab); });
}
function likeReview(courseId,reviewId) { const r=(reviewsData[courseId]||[]).find(r=>r.id===reviewId); if(r){r.helpful++;saveReviews();openCourseModal(courseId);showToast('Review marked as helpful!');} }
function downloadMaterial(courseId,matId) { const m=(materialsData[courseId]||[]).find(m=>m.id===matId); if(m){m.downloads++;saveMaterials();showToast(`Downloading ${m.filename}...`);} }
function showYearCourses(year) { document.getElementById('mainContent').innerHTML=renderCoursesPage(); document.getElementById('yearFilter').value=year; filterCourses(); lucide.createIcons(); }
function showCategoryCourses(cat) { document.getElementById('mainContent').innerHTML=renderCoursesPage(); document.getElementById('categoryFilter').value=cat; filterCourses(); lucide.createIcons(); }

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('mainContent').innerHTML=renderHomePage();
  lucide.createIcons();
  document.getElementById('mobileMenuBtn').addEventListener('click',()=>document.getElementById('mobileMenu').classList.toggle('hidden'));
  document.getElementById('courseModal').addEventListener('click',e=>{ if(e.target===document.getElementById('courseModal')) closeCourseModal(); });
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeCourseModal(); });
});
</script>
<script src="bridge.js"></script>
</body>
</html>
